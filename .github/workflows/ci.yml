name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  BUN_VERSION: "1.2.21"
  WAILS_VERSION: "v3.0.0-alpha.78"

jobs:
  frontend:
    name: Frontend (typecheck + lint + fmt)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: System deps (Wails CLI build needs GTK/WebKit on linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install Wails CLI (for bindings)
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Generate bindings
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          wails3 generate bindings -ts -clean

      - name: Install deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: frontend
        run: bunx tsc -b

      - name: Lint
        working-directory: frontend
        run: bun run lint
        continue-on-error: true

      - name: Format check
        working-directory: frontend
        run: bun run format:check
        continue-on-error: true

  backend:
    name: Backend (vet + build)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: System deps (Wails build deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Stub frontend/dist (satisfies go:embed)
        run: mkdir -p frontend/dist && touch frontend/dist/.keep

      - name: Format check
        continue-on-error: true
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Go files out of format:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -o /tmp/stash-ci .

  linux-appimage:
    name: Linux AppImage (Wails v3)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: System deps (Wails + AppImage)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config \
            libgirepository1.0-dev librsvg2-dev dpkg-dev file imagemagick

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Build + AppImage
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          task linux:create:appimage

      - uses: actions/upload-artifact@v4
        with:
          name: stash-linux-appimage
          path: bin/*.AppImage
          if-no-files-found: error

  windows-build:
    name: Windows build (Wails v3)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Build
        shell: bash
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          task windows:build

      - uses: actions/upload-artifact@v4
        with:
          name: stash-windows-amd64
          path: bin/stash.exe
          if-no-files-found: error
